<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Sistema Checador Showcase</title>
  <desc id="desc">Ilustracion demostrativa de una plataforma de asistencia multi-sede con dashboard, bot de WhatsApp y reportes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081521"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1380" cy="120" r="180" fill="#5eead4" opacity="0.1"/>
