  <rect x="415" y="250" width="245" height="120" rx="26" fill="#dcfce7"/>
  <text x="450" y="300" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Sedes</text>
  <text x="450" y="345" fill="#16a34a" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">12</text>
  <rect x="690" y="250" width="245" height="120" rx="26" fill="#dbeafe"/>
  <text x="725" y="300" fill="#1d4ed8" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Empleados</text>
  <text x="725" y="345" fill="#2563eb" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">248</text>
