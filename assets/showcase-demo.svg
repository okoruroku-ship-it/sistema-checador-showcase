  <text x="1090" y="493" fill="#1d728f" font-family="Segoe UI, Arial, sans-serif" font-size="22">Alta de dispositivos, estado y desvinculacion</text>
  <rect x="1090" y="515" width="220" height="16" rx="8" fill="#a7f3d0"/>
