  <text x="165" y="552" fill="#9fe9dd" font-family="Segoe UI, Arial, sans-serif" font-size="24">Reportes</text>
  <rect x="160" y="612" width="185" height="110" rx="24" fill="#133347"/>
  <text x="195" y="660" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Bot online</text>
  <circle cx="198" cy="695" r="10" fill="#22c55e"/>
